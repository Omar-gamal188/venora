# Nginx reverse proxy: serves the built SPA and proxies /api + /health to Node.
# Replace example.com and certificate paths, then:
#   sudo ln -s /etc/nginx/sites-available/venora /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name example.com www.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com www.example.com;

    # certbot --nginx will manage these lines for you
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers for the SPA (the API sets its own via Helmet)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Built frontend (vite build output copied to this directory)
    root /var/www/venora/dist;
    index index.html;

    # Product images arrive as base64 JSON — must exceed JSON_BODY_LIMIT
    client_max_body_size 12m;

    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        access_log off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
